services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8765
    networks:
      - full-stack-network
    depends_on:
      - backend
    restart: always
    ports:
      - "7896:7896"
    env_file:
      - .env
    
    

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - full-stack-network
    restart: always
    ports:
      - "8765:8765"

  nginx:
    image: nginx:stable-alpine
    networks:
      - full-stack-network
    restart: always
    volumes:                       
      - ./nginx/nginx.config:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8788:8788"

networks:
  full-stack-network:
    ipam:
      config:                      
        - subnet: 13.0.0.0/24
          gateway: 13.0.0.1