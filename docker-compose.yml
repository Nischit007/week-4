services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - full-stack-network
    depends_on:
      - backend
    restart: always
    ports:
      - "3000:3000"


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - full-stack-network
    restart: always

    

  nginx:
    image: nginx:stable-alpine
    networks:
      - full-stack-network
    restart: always
    volumes:                       
      - ./nginx/nginx.config:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8776:80"
    depends_on:
      - frontend
      - backend

networks:
  full-stack-network:
    ipam:
      config:                      
        - subnet: 13.0.0.0/24
          gateway: 13.0.0.1